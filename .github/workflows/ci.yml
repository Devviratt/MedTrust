name: MedTrust AI - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: devviratt/medtrust

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: medtrust_test
          POSTGRES_USER: medtrust_user
          POSTGRES_PASSWORD: test_secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run schema migration
        run: |
          PGPASSWORD=test_secret psql -h localhost -U medtrust_user -d medtrust_test -f src/utils/schema.sql
        working-directory: backend

      - name: Run Jest tests
        run: npx jest --config ../tests/backend/jest.config.js --coverage --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: medtrust_test
          DB_USER: medtrust_user
          DB_PASSWORD: test_secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret_key_32chars_minimum
          JWT_REFRESH_SECRET: test_refresh_secret_key_32chars

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend

  # ─── Python AI Tests ──────────────────────────────────────────────────────
  test-ai-services:
    name: AI Services Tests (PyTest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-services/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg libgl1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
        working-directory: ai-services

      - name: Generate gRPC stubs
        run: |
          mkdir -p proto_gen
          python -m grpc_tools.protoc -I./proto \
            --python_out=./proto_gen \
            --grpc_python_out=./proto_gen \
            proto/video_detection.proto proto/audio_detection.proto proto/biometric_engine.proto
          touch proto_gen/__init__.py
        working-directory: ai-services

      - name: Run PyTest
        run: pytest ../tests/ai_services -v --cov=. --cov-report=xml --tb=short
        working-directory: ai-services
        env:
          PYTHONPATH: .:./proto_gen

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ai-services
          flags: ai-services

  # ─── Frontend Build ───────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://medtrust.local/api/v1
          VITE_SOCKET_URL: https://medtrust.local

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker Build & Push ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-backend, test-ai-services, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push video service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-services
          file: ./ai-services/Dockerfile.video
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-video-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push audio service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-services
          file: ./ai-services/Dockerfile.audio
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-audio-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit (backend)
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
