syntax = "proto3";

package audiodetection;

service AudioDetectionService {
    rpc AnalyzeAudioChunk (AudioChunkRequest) returns (AudioAnalysisResponse);
    rpc TrainVoiceProfile (VoiceTrainingRequest) returns (VoiceTrainingResponse);
    rpc VerifySpeaker (SpeakerVerifyRequest) returns (SpeakerVerifyResponse);
}

message AudioChunkRequest {
    string stream_id    = 1;
    bytes  audio_data   = 2;
    int64  timestamp    = 3;
    int32  sample_rate  = 4;
    string doctor_id    = 5;
}

message AudioAnalysisResponse {
    string stream_id         = 1;
    float  voice_score       = 2;  // composite voice authenticity [0-1]
    float  mfcc_score        = 3;  // MFCC feature score
    float  spectrogram_score = 4;  // CNN spectrogram score
    float  wav2vec_score     = 5;  // Wav2Vec2 embedding similarity
    float  spoof_score       = 6;  // transformer spoof detection
    repeated float mfcc_features = 7;
    int64  processing_ms     = 8;
    string model_version     = 9;
}

message VoiceTrainingRequest {
    string doctor_id              = 1;
    repeated bytes audio_samples  = 2;
}

message VoiceTrainingResponse {
    string         doctor_id     = 1;
    repeated float embedding     = 2;
    string         model_version = 3;
    bool           success       = 4;
    string         message       = 5;
}

message SpeakerVerifyRequest {
    string doctor_id  = 1;
    bytes  audio_data = 2;
}

message SpeakerVerifyResponse {
    float  similarity = 1;
    bool   verified   = 2;
    string doctor_id  = 3;
}
