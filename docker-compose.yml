networks:
  medtrust_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  model_cache:
  backend_logs:

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: medtrust_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medtrust
      POSTGRES_USER: medtrust_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medtrust_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/utils/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    networks:
      - medtrust_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medtrust_user -d medtrust"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: medtrust_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - medtrust_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js API Gateway ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: medtrust_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      API_VERSION: v1
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medtrust
      DB_USER: medtrust_user
      DB_PASSWORD: ${POSTGRES_PASSWORD:-medtrust_secret}
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      REDIS_DB: 0
      REDIS_TTL: 3600
      # gRPC service URLs — must match grpc.js env var names
      AI_VIDEO_SERVICE_URL: video_service:50051
      AI_AUDIO_SERVICE_URL: audio_service:50052
      AI_BIOMETRIC_SERVICE_URL: biometric_service:50053
      # JWT — override in production
      JWT_SECRET: ${JWT_SECRET:-medtrust-dev-jwt-secret-min32chars!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-medtrust-dev-refresh-secret-32ch!}
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      # CORS — allow both Nginx frontend (port 80) and direct Vite dev (port 5173)
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 200
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 52428800
      LOG_LEVEL: info
      BLOCKCHAIN_API_URL: http://localhost:8080
      BLOCKCHAIN_CHANNEL: medtrust-channel
      BLOCKCHAIN_CHAINCODE: medtrust-cc
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medtrust_net
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Video AI Microservice ────────────────────────────────────────────────────
  video_service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.video
    container_name: medtrust_video_service
    restart: unless-stopped
    environment:
      VIDEO_SERVICE_PORT: 50051
      MODEL_CACHE_DIR: /models
    volumes:
      - model_cache:/models
    ports:
      - "50051:50051"
    networks:
      - medtrust_net

  # ─── Audio AI Microservice ────────────────────────────────────────────────────
  audio_service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.audio
    container_name: medtrust_audio_service
    restart: unless-stopped
    environment:
      AUDIO_SERVICE_PORT: 50052
      MODEL_CACHE_DIR: /models
    volumes:
      - model_cache:/models
    ports:
      - "50052:50052"
    networks:
      - medtrust_net

  # ─── Biometric Engine ────────────────────────────────────────────────────────
  biometric_service:
    build:
      context: ./ai-services
      dockerfile: Dockerfile.biometric
    container_name: medtrust_biometric_service
    restart: unless-stopped
    environment:
      BIOMETRIC_SERVICE_PORT: 50053
    ports:
      - "50053:50053"
    networks:
      - medtrust_net

  # ─── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api/v1
        VITE_SOCKET_URL: http://localhost:4000
    container_name: medtrust_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - medtrust_net
    depends_on:
      backend:
        condition: service_healthy

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: medtrust_prometheus
    restart: unless-stopped
    volumes:
      - ./devops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - medtrust_net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: medtrust_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    networks:
      - medtrust_net
